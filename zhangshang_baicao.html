<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>掌上百草 v1.0 — 中医方剂大全</title>
  <style>
    :root{
      --c1:#2D5016;--c2:#8B6914;--c3:#C9553D;--c4:#5C8A3A;
      --bg:#FDF6E3;--sf:#FFFEF8;--tx:#2C1810;--mt:#7A6B4E;--bd:#D4C4A8;
      --sh:rgba(45,80,22,.12);--gr:#E8F0DC;
      font-size:18px;
    }
    [data-theme="dark"]{
      --bg:#1A1408;--sf:#261C0E;--tx:#E8D5B0;--mt:#A09070;--bd:#3D3020;
      --sh:rgba(0,0,0,.3);--gr:#2A1E10;--c1:#5C8A3A;--c4:#8BC34A;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Songti SC','Noto Serif SC','SimSun',serif;background:var(--bg);color:var(--tx);min-height:100vh}
    a{color:var(--c1);text-decoration:none}
    button{font-family:inherit;cursor:pointer;border:none}
    input{font-family:inherit}

    /* ── Header ── */
    .hdr{background:var(--c1);padding:0 20px;height:60px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px var(--sh)}
    .hdr-tl{font-size:1.4rem;font-weight:700;color:#fff;letter-spacing:.1em;text-shadow:1px 1px 2px rgba(0,0,0,.3);display:flex;align-items:center;gap:8px}
    .hdr-tl span{font-size:.7rem;opacity:.8}
    .srch-wrap{flex:1;position:relative;max-width:500px}
    .srch-box{position:relative}
    .srch-box .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--mt);font-size:.9rem}
    #srch{width:100%;height:40px;padding:0 40px 0 38px;border:none;border-radius:20px;background:var(--gr);color:var(--tx);font-size:.9rem;border:1.5px solid transparent;transition:border-color .2s}
    #srch:focus{outline:none;border-color:var(--c1);background:var(--sf)}
    #srch::placeholder{color:var(--mt)}
    .si2{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--mt);font-size:.8rem;cursor:pointer;display:none}
    .si2.on{display:block}
    .srch-hist{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--sf);border:1px solid var(--bd);border-radius:12px;box-shadow:0 4px 16px var(--sh);z-index:200;overflow:hidden;display:none;max-height:300px;overflow-y:auto}
    .srch-hist.on{display:block}
    .srch-hi{padding:10px 16px;cursor:pointer;font-size:.85rem;color:var(--tx);display:flex;align-items:center;gap:8px;transition:background .1s;border-bottom:1px solid var(--bd)}
    .srch-hi:last-child{border-bottom:none}
    .srch-hi:hover{background:var(--gr)}
    .srch-hi .del{color:var(--c3);margin-left:auto;font-size:.75rem;padding:2px 6px;border-radius:4px}
    .srch-hi .del:hover{background:rgba(201,85,61,.1)}
    .hdr-actions{display:flex;gap:8px;margin-left:auto}
    .hdr-btn{width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;font-size:1rem;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center}
    .hdr-btn:hover{background:rgba(255,255,255,.25)}
    .hdr-btn.on{background:rgba(255,255,255,.3)}
    .hdr-btn .bdg{position:absolute;top:1px;right:1px;background:var(--c3);color:#fff;border-radius:50%;width:16px;height:16px;font-size:.6rem;font-weight:700;display:none;align-items:center;justify-content:center}
    .hdr-btn.on .bdg{display:flex}

    /* ── Category chips ── */
    .cat-scroll{position:sticky;top:60px;z-index:90;background:var(--bg);border-bottom:1px solid var(--bd);padding:8px 16px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
    .cat-scroll::-webkit-scrollbar{display:none}
    .cat-chip{padding:5px 14px;border-radius:16px;font-size:.8rem;white-space:nowrap;cursor:pointer;border:1.5px solid var(--bd);background:var(--sf);color:var(--tx);transition:all .15s;font-weight:600;flex-shrink:0}
    .cat-chip:hover{border-color:var(--c1);color:var(--c1)}
    .cat-chip.on{background:var(--c1);color:#fff;border-color:var(--c1)}
    .cat-chip .cnt{font-size:.7rem;opacity:.75;margin-left:4px}

    /* ── Grid ── */
    .main{padding:16px;max-width:1200px;margin:0 auto}
    .grd{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
    .card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:16px;cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative}
    .card:hover{transform:translateY(-2px);box-shadow:0 6px 20px var(--sh)}
    .card .fav{position:absolute;top:12px;right:12px;font-size:1rem;opacity:.5;transition:opacity .15s}
    .card .fav:hover,.card .fav.on{opacity:1}
    .card .fav.on{color:var(--c3)}
    .card-n{font-size:1.05rem;font-weight:700;color:var(--tx);margin-bottom:6px;font-family:'Songti SC',serif;line-height:1.3}
    .card-cat{display:inline-flex;align-items:center;gap:4px;background:var(--gr);color:var(--c1);font-size:.72rem;font-weight:600;padding:3px 10px;border-radius:10px;margin-bottom:8px}
    .card-effect{font-size:.8rem;color:var(--mt);margin-bottom:8px;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card-herbs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
    .herb-tag{font-size:.68rem;padding:2px 8px;border-radius:8px;background:rgba(139,105,20,.08);color:var(--c2);border:1px solid rgba(139,105,20,.15)}
    .card-dsc{display:flex;align-items:center;gap:8px;font-size:.72rem;color:var(--mt);margin-top:6px}
    .card-dsc .src{color:var(--c1);font-weight:600}
    .emp{padding:60px 20px;text-align:center;color:var(--mt)}
    .emp .ic{font-size:3rem;margin-bottom:12px;opacity:.4}
    .emp p{font-size:1rem}

    /* ── Modal ── */
    .md{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:none;align-items:center;justify-content:center;padding:16px;overflow-y:auto}
    .md.on{display:flex}
    .md-in{background:var(--sf);border-radius:16px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;position:relative;animation:mdIn .25s ease}
    @keyframes mdIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
    .md-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--sf);z-index:2;border-radius:16px 16px 0 0}
    .md-tl{font-size:1.1rem;font-weight:700;color:var(--tx)}
    .md-cls{width:32px;height:32px;border:none;background:var(--gr);border-radius:50%;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s}
    .md-cls:hover{background:var(--bd)}
    .md-bd{padding:20px}
    .md-h{display:flex;align-items:center;gap:16px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--bd)}
    .md-h .ico{font-size:2.5rem;flex-shrink:0}
    .md-h .met{flex:1}
    .md-h .met .nm{font-size:1.2rem;font-weight:700;color:var(--tx);margin-bottom:4px}
    .md-h .met .cat{font-size:.78rem;padding:3px 10px;border-radius:10px;background:var(--c1);color:#fff;display:inline-block;margin-bottom:6px}
    .md-h .met .src{font-size:.78rem;color:var(--mt)}
    .md-fav{font-size:1.4rem;cursor:pointer;flex-shrink:0;opacity:.5}
    .md-fav:hover,.md-fav.on{opacity:1;color:var(--c3)}
    .md-fav.on{color:var(--c3)}
    .md-row{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
    .md-tag{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:10px;font-size:.78rem;font-weight:600;border:1.5px solid}
    .md-tag.grn{background:rgba(45,80,22,.08);color:var(--c1);border-color:rgba(45,80,22,.2)}
    .md-tag.gld{background:rgba(139,105,20,.08);color:var(--c2);border-color:rgba(139,105,20,.2)}
    .md-tag.red{background:rgba(201,85,61,.08);color:var(--c3);border-color:rgba(201,85,61,.2)}
    .md-sec{margin-bottom:16px}
    .md-sb{font-size:.78rem;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
    .md-tx{font-size:.9rem;color:var(--tx);line-height:1.8}
    .md-herbs{display:flex;flex-wrap:wrap;gap:6px}
    .md-herb{font-size:.8rem;padding:5px 12px;border-radius:10px;background:var(--gr);color:var(--c1);border:1px solid rgba(45,80,22,.15)}
    .md-nav{display:flex;gap:10px;padding:12px 20px;border-top:1px solid var(--bd);position:sticky;bottom:0;background:var(--sf)}
    .md-nav-btn{flex:1;height:40px;border:1.5px solid var(--bd);background:var(--sf);border-radius:20px;font-size:.85rem;cursor:pointer;color:var(--tx);display:flex;align-items:center;justify-content:center;gap:6px;transition:all .12s}
    .md-nav-btn:hover{border-color:var(--c1);color:var(--c1);background:rgba(45,80,22,.05)}
    .md-nav-btn:disabled{opacity:.4;cursor:not-allowed}

    /* ── Favorites panel ── */
    .fav-panel{position:fixed;top:0;right:0;width:320px;max-width:85vw;height:100vh;background:var(--sf);z-index:600;box-shadow:-4px 0 24px rgba(0,0,0,.2);transform:translateX(100%);transition:transform .3s ease;overflow-y:auto}
    .fav-panel.on{transform:translateX(0)}
    .fav-panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--sf);z-index:1}
    .fav-panel-hdr h3{font-size:1rem;font-weight:700;color:var(--tx)}
    .fav-panel-close{width:32px;height:32px;border:none;background:var(--gr);border-radius:50%;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .fav-panel-body{padding:12px}
    .fav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:background .12s;margin-bottom:4px}
    .fav-item:hover{background:var(--gr)}
    .fav-item-icon{font-size:1.3rem;flex-shrink:0}
    .fav-item-info{flex:1;min-width:0}
    .fav-item-name{font-size:.875rem;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .fav-item-meta{font-size:.7rem;color:var(--mt);margin-top:2px}
    .fav-item-del{font-size:.7rem;color:var(--c3);opacity:0;padding:4px 8px;border-radius:6px;background:transparent;border:none;cursor:pointer;transition:opacity .12s}
    .fav-item:hover .fav-item-del{opacity:1}
    .fav-item-del:hover{background:rgba(201,85,61,.1)}
    .fav-emp{text-align:center;padding:40px 20px;color:var(--mt);font-size:.9rem}

    /* ── Mobile filter panel ── */
    .mob-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:198;display:none;opacity:0;transition:opacity .25s}
    .mob-overlay.on{display:block;opacity:1}
    .mob-filter-panel{position:fixed;bottom:0;left:0;right:0;background:var(--sf);z-index:200;border-radius:20px 20px 0 0;box-shadow:0 -4px 30px rgba(0,0,0,.2);transform:translateY(100%);transition:transform .3s ease;max-height:75vh;display:flex;flex-direction:column}
    .mob-filter-panel.on{transform:translateY(0)}
    .mfp-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bd);flex-shrink:0}
    .mfp-hdr h3{font-size:1rem;font-weight:700;color:var(--tx)}
    .mfp-close{width:32px;height:32px;border:none;background:var(--gr);border-radius:50%;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .mfp-body{padding:16px;overflow-y:auto;flex:1}
    .mfp-cat{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
    .mfp-chip{padding:6px 14px;border-radius:14px;font-size:.8rem;border:1.5px solid var(--bd);background:var(--sf);color:var(--tx);cursor:pointer;transition:all .15s}
    .mfp-chip.on{background:var(--c1);color:#fff;border-color:var(--c1)}
    .mfp-ftr{display:flex;gap:10px;padding:14px 20px;border-top:1px solid var(--bd);flex-shrink:0}
    .mfp-ftr button{height:40px;border-radius:20px;font-size:.875rem;flex:1;font-weight:600;cursor:pointer;transition:all .15s}
    .btn-mob-filter{display:none;height:38px;padding:0 14px;background:var(--bg);color:var(--tx);border:1.5px solid var(--bd);border-radius:19px;font-size:.8rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
    .btn-mob-filter:hover{border-color:var(--c1);color:var(--c1)}
    .btn-mob-filter.on{background:var(--c1);color:#fff;border-color:var(--c1)}

    @media(max-width:640px){
      .btn-mob-filter{display:flex!important}
      .hdr-tl{font-size:1.1rem}
    }

    /* ── Result count bar ── */
    .rs-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 4px;font-size:.8rem;color:var(--mt);margin-bottom:8px}
    .rs-bar strong{color:var(--c1);font-weight:700}
    .sort-sel{height:32px;padding:0 10px;border-radius:16px;border:1.5px solid var(--bd);background:var(--sf);color:var(--tx);font-size:.78rem;cursor:pointer}
  </style>
</head>
<body>

<!-- Header -->
<header class="hdr">
  <div class="hdr-tl">🌿 掌上百草 <span>v1.0</span></div>
  <div class="srch-wrap">
    <div class="srch-box">
      <span class="si">🔍</span>
      <input type="search" id="srch" placeholder="搜索方剂名称/功效/组成…" autocomplete="off">
      <span class="si2" id="clearSrch">✕</span>
      <div class="srch-hist" id="srchHist"></div>
    </div>
  </div>
  <div class="hdr-actions">
    <button class="hdr-btn" id="favBtn" title="我的收藏" aria-label="收藏夹">❤️<span class="bdg" id="favBdg">0</span></button>
    <button class="hdr-btn" id="themeBtn" title="切换深色模式" aria-label="深色模式">🌙</button>
  </div>
  <button class="btn-mob-filter" id="mobFilterBtn" aria-label="疾病分类">🔍 分类</button>
</header>

<!-- Category chips -->
<div class="cat-scroll" id="catScroll"></div>

<!-- Main grid -->
<main class="main">
  <div class="rs-bar" id="rsBar">
    <span id="rsCount"></span>
    <select class="sort-sel" id="sortSel">
      <option value="def">默认排序</option>
      <option value="name">按名称</option>
      <option value="cat">按分类</option>
      <option value="rnd">随机</option>
    </select>
  </div>
  <div class="grd" id="grid" role="list"></div>
  <div class="emp" id="emp" style="display:none">
    <div class="ic">🌿</div>
    <p>未找到相关方剂</p>
  </div>
</main>

<!-- Detail Modal -->
<div class="md" id="md" role="dialog" aria-modal="true">
  <div class="md-in">
    <div class="md-hdr">
      <span class="md-tl" id="mdTl"></span>
      <button class="md-cls" id="mdCls">✕</button>
    </div>
    <div class="md-bd" id="mdBd"></div>
    <div class="md-nav" id="mdNav">
      <button class="md-nav-btn" id="mdPrev">◀ 上一条</button>
      <button class="md-nav-btn" id="mdNext">下一条 ▶</button>
    </div>
  </div>
</div>

<!-- Favorites panel -->
<div class="fav-panel" id="favPanel">
  <div class="fav-panel-hdr">
    <h3>❤️ 我的收藏</h3>
    <button class="fav-panel-close" id="favPanelClose">✕</button>
  </div>
  <div class="fav-panel-body" id="favPanelBody"></div>
</div>

<!-- Mobile filter overlay -->
<div class="mob-overlay" id="mobOverlay"></div>
<div class="mob-filter-panel" id="mobFilterPanel">
  <div class="mfp-hdr">
    <h3>选择分类</h3>
    <button class="mfp-close" id="mfpClose">✕</button>
  </div>
  <div class="mfp-body">
    <div class="mfp-cat" id="mfpCat"></div>
  </div>
  <div class="mfp-ftr">
    <button style="background:var(--gr);border:1.5px solid var(--bd);color:var(--tx)" id="mfpReset">重置</button>
    <button style="background:var(--c1);color:#fff;border:none" id="mfpApply">应用</button>
  </div>
</div>

<script>
const LS_FAV = 'zbb_favs';
const LS_HIST = 'zbb_hist';
const LS_THEME = 'zbb_theme';
const LS_DARK = 'zbb_dark';

let FAVS = JSON.parse(localStorage.getItem(LS_FAV) || '[]');
let HIST = JSON.parse(localStorage.getItem(LS_HIST) || '[]');
let filtered = [...DATA];
let curCat = '全部';
let curQ = '';
let curSort = 'def';
let mIdx = 0;
let favPanelOn = false;

function save(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
function load(k,def){ try { return JSON.parse(localStorage.getItem(k)) || def; } catch { return def; } }

// ── Theme ──
function applyTheme(dark){
  document.documentElement.dataset.theme = dark ? 'dark' : '';
  const btn = document.getElementById('themeBtn');
  btn.textContent = dark ? '☀️' : '🌙';
}
(function(){
  const dark = localStorage.getItem(LS_DARK) === '1';
  applyTheme(dark);
  document.getElementById('themeBtn').onclick = ()=>{
    const now = document.documentElement.dataset.theme !== 'dark';
    applyTheme(now);
    localStorage.setItem(LS_DARK, now ? '1' : '0');
  };
})();

// ── Category chips ──
function buildCatChips(){
  const cats = ['全部', ...new Set(DATA.map(d=>d.category))];
  const sc = document.getElementById('catScroll');
  sc.innerHTML = cats.map(c => {
    const cnt = c === '全部' ? DATA.length : DATA.filter(d=>d.category===c).length;
    return `<button class="cat-chip${c===curCat?' on':''}" data-cat="${c}">${c}<span class="cnt">${cnt}</span></button>`;
  }).join('');
  sc.querySelectorAll('.cat-chip').forEach(b => {
    b.onclick = () => {
      curCat = b.dataset.cat;
      buildCatChips();
      apply();
      closeMobFilter();
    };
  });
}

// ── Mobile filter ──
function openMobFilter(){
  document.getElementById('mobOverlay').classList.add('on');
  document.getElementById('mobFilterPanel').classList.add('on');
  const cats = ['全部', ...new Set(DATA.map(d=>d.category))];
  document.getElementById('mfpCat').innerHTML = cats.map(c => {
    const cnt = c === '全部' ? DATA.length : DATA.filter(d=>d.category===c).length;
    return `<button class="mfp-chip${c===curCat?' on':''}" data-cat="${c}">${c} (${cnt})</button>`;
  }).join('');
  document.querySelectorAll('#mfpCat .mfp-chip').forEach(b => {
    b.onclick = () => {
      curCat = b.dataset.cat;
      document.querySelectorAll('#mfpCat .mfp-chip').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
    };
  });
}
function closeMobFilter(){
  document.getElementById('mobOverlay').classList.remove('on');
  document.getElementById('mobFilterPanel').classList.remove('on');
}
document.getElementById('mobFilterBtn').onclick = openMobFilter;
document.getElementById('mobOverlay').onclick = closeMobFilter;
document.getElementById('mfpClose').onclick = closeMobFilter;
document.getElementById('mfpReset').onclick = () => {
  curCat = '全部';
  closeMobFilter();
  buildCatChips();
  apply();
};
document.getElementById('mfpApply').onclick = () => {
  buildCatChips();
  apply();
  closeMobFilter();
};

// ── Search ──
const srchEl = document.getElementById('srch');
const srchHistEl = document.getElementById('srchHist');
srchEl.addEventListener('keydown', e => {
  if(e.key === 'Enter'){
    const q = srchEl.value.trim();
    if(!q) return;
    curQ = q;
    addHist(q);
    apply();
    srchHistEl.classList.remove('on');
  }
});
srchEl.addEventListener('input', () => {
  document.getElementById('clearSrch').classList.toggle('on', !!srchEl.value.length);
  const q = srchEl.value.trim().toLowerCase();
  document.getElementById('clearSrch').classList.toggle('on', !!srchEl.value.length);
  curQ = q;
  apply();
});
srchEl.addEventListener('focus', () => { if(HIST.length) srchHistEl.classList.add('on'); });
srchEl.addEventListener('blur', () => { setTimeout(()=>srchHistEl.classList.remove('on'), 200); });
document.getElementById('clearSrch').onclick = () => {
  srchEl.value = '';
  curQ = '';
  document.getElementById('clearSrch').classList.remove('on');
  apply();
};
function addHist(q){
  HIST = HIST.filter(h=>h!==q);
  HIST.unshift(q);
  HIST = HIST.slice(0,8);
  save(LS_HIST, HIST);
  renderHist();
}
function renderHist(){
  if(!HIST.length){ srchHistEl.classList.remove('on'); return; }
  srchHistEl.innerHTML = `<div class="srch-hi" id="clrAllHist" style="color:var(--c3);font-weight:600;border-bottom:1px solid var(--bd)">🗑️ 清空历史</div>` +
    HIST.map(h => `<div class="srch-hi" data-q="${h}">🔍 ${h}<span class="del" data-q="${h}">删除</span></div>`).join('');
  srchHistEl.classList.add('on');
  document.getElementById('clrAllHist').onclick = () => {
    if(confirm('确定清空全部搜索历史？')){ HIST=[]; save(LS_HIST,[]); srshHistEl.classList.remove('on'); }
  };
  srchHistEl.querySelectorAll('.srch-hi[data-q]').forEach(div => {
    div.onclick = (e) => {
      if(e.target.classList.contains('del')){
        HIST = HIST.filter(h=>h!==div.dataset.q);
        save(LS_HIST, HIST);
        renderHist();
        return;
      }
      srchEl.value = div.dataset.q;
      curQ = div.dataset.q;
      apply();
      srchHistEl.classList.remove('on');
    };
  });
}

// ── Sort ──
document.getElementById('sortSel').onchange = (e) => {
  curSort = e.target.value;
  apply();
};

// ── Filter & Sort ──
function apply(){
  const q = curQ.toLowerCase();
  filtered = DATA.filter(d => {
    let ok = true;
    if(q){
      const nameOk = d.name.toLowerCase().includes(q);
      const effectOk = d.effect.toLowerCase().includes(q);
      const herbOk = d.herbs.some(h=>h.toLowerCase().includes(q));
      ok = nameOk || effectOk || herbOk;
    }
    if(curCat !== '全部' && d.category !== curCat) ok = false;
    return ok;
  });
  if(curSort === 'name') filtered.sort((a,b)=>a.name.localeCompare(b.name));
  else if(curSort === 'cat') filtered.sort((a,b)=>a.category.localeCompare(b.category));
  else if(curSort === 'rnd') filtered.sort(()=>Math.random()-0.5);
  render();
}

// ── Render ──
function render(){
  const grid = document.getElementById('grid');
  const emp = document.getElementById('emp');
  document.getElementById('rsCount').innerHTML = `共 <strong>${filtered.length}</strong> 个方剂${curCat!=='全部'?' / '+curCat:''}`;
  if(!filtered.length){ grid.style.display='none'; emp.style.display='block'; return; }
  grid.style.display=''; emp.style.display='none';
  grid.innerHTML = filtered.map((d,i) => `
    <article class="card" data-i="${i}" data-id="${d.id}" role="listitem">
      <span class="fav${FAVS.includes(d.id)?' on':''}">${FAVS.includes(d.id)?'⭐':'🤍'}</span>
      <div class="card-n">${d.name}</div>
      <div class="card-cat">${d.category}</div>
      <div class="card-effect">${d.effect}</div>
      <div class="card-herbs">${d.herbs.slice(0,6).map(h=>`<span class="herb-tag">${h}</span>`).join('')}${d.herbs.length>6?'<span class="herb-tag">…</span>':''}</div>
      <div class="card-dsc"><span>📖 ${d.classical}</span></div>
    </article>
  `).join('');
  grid.querySelectorAll('.card').forEach(card => {
    card.querySelector('.fav').onclick = (e) => {
      e.stopPropagation();
      toggleFav(parseInt(card.dataset.id));
    };
    card.onclick = () => openM(parseInt(card.dataset.id));
  });
}

// ── Modal ──
function openM(id){
  const realIdx = filtered.findIndex(d=>d.id===id);
  if(realIdx<0) return;
  mIdx = realIdx;
  const d = filtered[mIdx];
  document.getElementById('mdTl').textContent = d.name;
  document.getElementById('mdBd').innerHTML = `
    <div class="md-h">
      <div class="ico">🌿</div>
      <div class="met">
        <div class="nm">${d.name}</div>
        <span class="cat">${d.category}</span>
        <div class="src">📖 ${d.classical}</div>
      </div>
      <span class="md-fav${FAVS.includes(d.id)?' on':''}" id="mdFavBtn">${FAVS.includes(d.id)?'⭐':'🤍'}</span>
    </div>
    <div class="md-row">
      <span class="md-tag grn">💚 ${d.desc}</span>
      <span class="md-tag gld">📋 主治：${d.cure}</span>
    </div>
    <div class="md-sec">
      <div class="md-sb">功效主治</div>
      <p class="md-tx">${d.effect}</p>
    </div>
    <div class="md-sec">
      <div class="md-sb">组成药材</div>
      <div class="md-herbs">${d.herbs.map(h=>`<span class="md-herb">${h}</span>`).join('')}</div>
      <p class="md-tx" style="margin-top:8px;font-size:.82rem;color:var(--mt)">💊 用量：${d.dose} · ${d.usage}</p>
    </div>
    <div class="md-sec">
      <div class="md-sb">经典来源</div>
      <p class="md-tx">📖 ${d.classical}</p>
    </div>
  `;
  document.getElementById('mdFavBtn').onclick = () => { toggleFav(d.id); document.getElementById('mdFavBtn').textContent = FAVS.includes(d.id)?'⭐':'🤍'; document.getElementById('mdFavBtn').classList.toggle('on', FAVS.includes(d.id)); };
  const prevBtn = document.getElementById('mdPrev');
  const nextBtn = document.getElementById('mdNext');
  prevBtn.disabled = mIdx <= 0;
  nextBtn.disabled = mIdx >= filtered.length - 1;
  document.getElementById('md').classList.add('on');
  document.body.style.overflow = 'hidden';
}
document.getElementById('mdCls').onclick = () => { document.getElementById('md').classList.remove('on'); document.body.style.overflow = ''; };
document.getElementById('mdPrev').onclick = () => { if(mIdx>0){ openM(filtered[mIdx-1].id); } };
document.getElementById('mdNext').onclick = () => { if(mIdx<filtered.length-1){ openM(filtered[mIdx+1].id); } };
document.getElementById('md').onclick = (e) => { if(e.target===document.getElementById('md')){ document.getElementById('md').classList.remove('on'); document.body.style.overflow=''; } };

// ── Favorites ──
function toggleFav(id){
  FAVS = FAVS.includes(id) ? FAVS.filter(f=>f!==id) : [...FAVS, id];
  save(LS_FAV, FAVS);
  updateFavBdg();
  render();
  renderFavPanel();
}
function updateFavBdg(){
  const bd = document.getElementById('favBdg');
  if(FAVS.length){ bd.textContent=FAVS.length; bd.style.display=''; } else { bd.style.display='none'; }
}
function renderFavPanel(){
  const body = document.getElementById('favPanelBody');
  if(!FAVS.length){ body.innerHTML='<div class="fav-emp">暂无收藏<br>点击方剂心形收藏</div>'; return; }
  const favData = FAVS.map(id=>DATA.find(d=>d.id===id)).filter(Boolean);
  body.innerHTML = favData.map(d => `
    <div class="fav-item" data-id="${d.id}">
      <span class="fav-item-icon">🌿</span>
      <div class="fav-item-info">
        <div class="fav-item-name">${d.name}</div>
        <div class="fav-item-meta">${d.category} · ${d.classical}</div>
      </div>
      <button class="fav-item-del" data-id="${d.id}">删除</button>
    </div>
  `).join('');
  body.querySelectorAll('.fav-item').forEach(item => {
    item.querySelector('.fav-item-icon').onclick = () => { openM(parseInt(item.dataset.id)); closeFavPanel(); };
    item.querySelector('.fav-item-del').onclick = (e) => { e.stopPropagation(); toggleFav(parseInt(item.dataset.id)); };
  });
}
function closeFavPanel(){ document.getElementById('favPanel').classList.remove('on'); favPanelOn=false; }
document.getElementById('favBtn').onclick = () => {
  favPanelOn = !favPanelOn;
  document.getElementById('favPanel').classList.toggle('on', favPanelOn);
  if(favPanelOn) renderFavPanel();
};
document.getElementById('favPanelClose').onclick = closeFavPanel;

// ── Boot ──
buildCatChips();
updateFavBdg();
renderHist();
apply();
</script>
</script>
</body>
</html>
